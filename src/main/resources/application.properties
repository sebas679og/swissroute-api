# Application Configuration for Swiss Route API
spring.application.name=swissroute-api
server.port=8080
spring.config.import=optional:file:.env[.properties]
logging.level.org.springframework=${SWISS_ROUTE_LEVEL_LOGIN:WARN}
logging.level.root=${SWISS_ROUTE_LEVEL_LOGIN:INFO}

# Datasource Configuration
spring.datasource.url=${SWISS_ROUTE_DATASOURCE_URL}
spring.datasource.username=${SWISS_ROUTE_DATASOURCE_USERNAME}
spring.datasource.password=${SWISS_ROUTE_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${SWISS_ROUTE_JPA_DDL:validate}
spring.jpa.show-sql=${SWISS_ROUTE_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# Swiss Route API Transport
swissroute.transport.api.base-url=${SWISS_ROUTE_TRANSPORT_API_BASE_URL}

# Documentation Configuration (Swagger/OpenAPI)
springdoc.api-docs.enabled=${SWAGGER_UI_DOCUMENTATION_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_UI_DOCUMENTATION_ENABLED:false}
springdoc.api-docs.version=OPENAPI_3_1
