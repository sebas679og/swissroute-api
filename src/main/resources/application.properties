# Application Configuration for Swiss Route API
spring.application.name=swissroute-api
server.port=8080
spring.config.import=optional:file:.env[.properties]
logging.level.org.springframework=${SWISS_ROUTE_LEVEL_LOGIN:WARN}
logging.level.root=${SWISS_ROUTE_LEVEL_LOGIN:INFO}
spring.mvc.format.enum=to_lower_case
spring.jackson.mapper.accept-case-insensitive-enums=true

# Datasource Configuration
spring.datasource.url=${SWISS_ROUTE_DATASOURCE_URL}
spring.datasource.username=${SWISS_ROUTE_DATASOURCE_USERNAME}
spring.datasource.password=${SWISS_ROUTE_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${SWISS_ROUTE_JPA_DDL:validate}
spring.jpa.show-sql=${SWISS_ROUTE_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# Swiss Route API Transport
swissroute.app.transport.api.base-url=${SWISS_ROUTE_TRANSPORT_API_BASE_URL}
swissroute.app.transport.api.connect-timeout-ms=${SWISS_ROUTE_TRANSPORT_API_CONNECT_TIMEOUT_MS:3000}
swissroute.app.transport.api.read-timeout-ms=${SWISS_ROUTE_TRANSPORT_API_READ_TIMEOUT_MS:10000}
swissroute.app.transport.api.write-timeout-ms=${SWISS_ROUTE_TRANSPORT_API_WRITE_TIMEOUT_MS:5000}
swissroute.app.transport.api.memory-size=${SWISS_ROUTE_TRANSPORT_API_MEMORY_SIZE_MB:10}

# Cors Configuration
swissroute.app.cors.allowed-methods=${SWISS_ROUTE_ALLOWED_METHODS}
swissroute.app.cors.allowed-origins=${SWISS_ROUTE_ALLOWED_ORIGINS}
swissroute.app.cors.max-age=${SWISS_ROUTE_MAX_AGE:3600}

# Jwt Configurations
swissroute.app.jwt.secret=${SWISS_ROUTE_JWT_SECRET}
swissroute.app.jwt.expiration=${SWISS_ROUTE_JWT_EXPIRATION:3600}
swissroute.app.jwt.token-type=${SWISS_ROUTE_TOKEN_TYPE:Bearer}

# Documentation Configuration (Swagger/OpenAPI)
springdoc.api-docs.enabled=${SWAGGER_UI_DOCUMENTATION_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_UI_DOCUMENTATION_ENABLED:false}
springdoc.api-docs.version=OPENAPI_3_1
