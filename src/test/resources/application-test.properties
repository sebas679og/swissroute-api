# Application Configuration for Swiss Route API
spring.application.name=swissroute-api
server.port=8080
logging.level.org.springframework=WARN
logging.level.root=WARN
logging.level.com.group4=DEBUG
spring.mvc.format.enum=to_lower_case

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Swiss Route API Transport
swissroute.app.transport.api.base-url=http://localhost:8081/api
swissroute.app.transport.api.connect-timeout-ms=3000
swissroute.app.transport.api.read-timeout-ms=10000
swissroute.app.transport.api.write-timeout-ms=5000

# Jwt Configurations
swissroute.app.jwt.secret=qZFeQgkc/cIUrFxHZRdVVgJvI6+9O/mysoBdxeq6s94=
swissroute.app.jwt.expiration=3600
swissroute.app.jwt.token-type=Bearer

# Cors Configuration
swissroute.app.cors.allowed-methods=GET,POST,PUT,DELETE
swissroute.app.cors.allowed-origins=http://localhost:3000
swissroute.app.cors.max-age=3600

# Documentation Configuration (Swagger/OpenAPI)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
springdoc.api-docs.version=OPENAPI_3_1